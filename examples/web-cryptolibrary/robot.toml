[env]
# Password for the CryptoLibrary private key.
# In Robotmk (Checkmk) this is configured in the robot rule under "Secret variables".
# For local testing, change this to your actual key password.
RMKCRYPTPW = "rmksecret"

# Used in the robot file to determine whether headless should be true or false. 
# Fallback is the value of this variable => show the UI
ROBOTMK_HEADLESS_HOST="false"